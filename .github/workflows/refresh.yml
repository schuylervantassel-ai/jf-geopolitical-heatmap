name: Refresh Heatmap
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests feedparser beautifulsoup4
      - run: python jtgeopolmap.py
        env:
          CI: "true"
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-refresh heatmap data"
          file_pattern: jf_heatmap.html
